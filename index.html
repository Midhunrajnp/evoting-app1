<!DOCTYPE html>
<html>
<head>
    <title>E-Voting App</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f4f4f4;
        }
        button {
            padding: 10px;
            margin: 5px;
            cursor: pointer;
        }
        .card {
            background: white;
            padding: 15px;
            margin: 10px;
            display: inline-block;
            border-radius: 10px;
            box-shadow: 0px 0px 5px gray;
        }
    </style>
</head>
<body>

<h1>🗳 E-Voting System</h1>

<button onclick="loadCandidates()">Load Candidates</button>
<button onclick="showResults()">Show Results</button>
<button onclick="resetVotes()">Reset Votes</button>

<div id="candidates"></div>
<div id="results"></div>

<script>
const baseURL = "http://localhost:8081/vote";

function loadCandidates() {
    fetch(baseURL + "/candidates")
        .then(res => res.json())
        .then(data => {
            let html = "";
            data.forEach(c => {
                const key = c.name === "Candidate A" ? "A" : "B";

                html += `
                    <div class="card">
                        <h3>${c.name}</h3>
                        <button onclick="vote('${key}')">Vote</button>
                    </div>
                `;
            });
            document.getElementById("candidates").innerHTML = html;
        });
}

function vote(name) {
    fetch(baseURL + "/" + name, {
        method: "POST"
    })
    .then(res => res.text())
    .then(msg => {
        alert(msg);
        showResults(); // auto update
    });
}

function showResults() {
    fetch(baseURL + "/results")
        .then(res => res.json())
        .then(data => {
            let html = "<h2>Results</h2>";
            data.forEach(c => {
                html += `<p>${c.name}: ${c.votes}</p>`;
            });
            document.getElementById("results").innerHTML = html;
        });
}

function resetVotes() {
    fetch(baseURL + "/reset", {
        method: "POST"
    })
    .then(res => res.text())
    .then(msg => {
        alert(msg);
        loadCandidates();
        showResults();
    });
}
</script>

</body>
</html>
