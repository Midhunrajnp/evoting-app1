<!DOCTYPE html>
<html>
<head>
    <title>E-Voting System</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: url('https://images.unsplash.com/photo-1554475901-4538ddfbccc2') no-repeat center center/cover;
            height: 100vh;
        }

        .overlay {
            background: rgba(0,0,0,0.6);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            width: 320px;
            box-shadow: 0px 0px 20px rgba(0,0,0,0.5);
        }

        h1 {
            color: #333;
        }

        input {
            padding: 10px;
            width: 85%;
            margin-bottom: 15px;
            border-radius: 5px;
            border: 1px solid gray;
        }

        button {
            padding: 10px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            width: 80%;
        }

        .voteA {
            background: #4CAF50;
            color: white;
        }

        .voteB {
            background: #2196F3;
            color: white;
        }

        .action {
            background: #333;
            color: white;
        }

        #result {
            margin-top: 15px;
            display: none;
            font-weight: bold;
        }

        .logo {
            width: 60px;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

<div class="overlay">

    <div class="container">

        <!-- Voting Icon -->
        <img class="logo" src="https://cdn-icons-png.flaticon.com/512/3062/3062634.png">

        <h1>E-Voting</h1>

        <input type="text" id="username" placeholder="Enter your name">

        <button class="voteA" onclick="vote('A')">Vote Candidate A</button>
        <button class="voteB" onclick="vote('B')">Vote Candidate B</button>

        <button class="action" onclick="showResults()">Show Results</button>
        <button class="action" onclick="resetVotes()">Reset Votes</button>

        <div id="result"></div>

    </div>

</div>

<script>
const BASE_URL = "http://localhost:8082/vote";

function vote(candidate) {
    const user = document.getElementById("username").value;

    if (!user) {
        alert("Enter your name!");
        return;
    }

    fetch(BASE_URL + "/" + candidate, { method: "POST" })
        .then(res => res.text())
        .then(msg => {
            alert(user + ": " + msg);
        });
}

function showResults() {
    fetch(BASE_URL + "/results")
        .then(res => res.json())
        .then(data => {
            let text = "";
            data.forEach(c => {
                text += c.name + " : " + c.votes + "<br>";
            });

            let resultBox = document.getElementById("result");
            resultBox.style.display = "block";
            resultBox.innerHTML = text;
        });
}

function resetVotes() {
    fetch(BASE_URL + "/reset", { method: "POST" })
        .then(res => res.text())
        .then(msg => {
            alert(msg);
            document.getElementById("result").style.display = "none";
        });
}
</script>

</body>
</html>
